name: Build iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install meson ninja pkg-config

    - name: Build libmpv for iOS
      run: |
        cd scripts
        chmod +x build-libmpv.sh
        ./build-libmpv.sh
      env:
        IOS_DEPLOYMENT_TARGET: "15.0"

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS App
      run: |
        cd MPVPlayer4Anime/App
        xcodebuild \
          -project MPVPlayer4Anime.xcodeproj \
          -scheme MPVPlayer4Anime \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive App
      run: |
        cd MPVPlayer4Anime/App
        xcodebuild archive \
          -project MPVPlayer4Anime.xcodeproj \
          -scheme MPVPlayer4Anime \
          -archivePath build/MPVPlayer4Anime.xcarchive \
          -sdk iphoneos \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MPVPlayer4Anime-xcarchive
        path: MPVPlayer4Anime/App/build/MPVPlayer4Anime.xcarchive
